name: CalSnap Web

on:
  push:
    paths:
      - 'calsnap-web/**'
      - '.github/workflows/calsnap-web.yml'
  pull_request:
    paths:
      - 'calsnap-web/**'
      - '.github/workflows/calsnap-web.yml'

defaults:
  run:
    working-directory: calsnap-web

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: calsnap-web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - name: Verify no GEMINI_API_KEY in client bundle
        run: '! grep -rq GEMINI_API_KEY .next/static'

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: calsnap-web/pnpm-lock.yaml
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:integration


