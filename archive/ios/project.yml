name: CalSnap
options:
  bundleIdPrefix: com.calsnap
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  CalSnap:
    type: application
    platform: iOS
    sources:
      - path: CalSnap
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.calsnap.app
      PRODUCT_NAME: CalSnap
      TARGETED_DEVICE_FAMILY: "1"
      INFOPLIST_FILE: CalSnap/Resources/Info.plist
      GENERATE_INFOPLIST_FILE: false
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      SWIFT_EMIT_LOC_STRINGS: YES
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0
      DEVELOPMENT_TEAM: ""
    scheme:
      testTargets:
        - CalSnapTests
  CalSnapTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CalSnapTests
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.calsnap.app.tests
      TARGETED_DEVICE_FAMILY: "1"
      GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: CalSnap
